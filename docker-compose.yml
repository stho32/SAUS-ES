services:
  app:
    build:
      context: ./Source
      dockerfile: docker/Dockerfile
    ports:
      - "8000:80"
    volumes:
      - ./Source:/var/www/html
      - vendor_data:/var/www/html/vendor
    environment:
      - APP_NAME=SAUS-i
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=${APP_KEY:-base64:REP7MlRSUjsyk6kNFPjcWKc5qVZEEs98TN892ZJO0tQ=}
      - APP_URL=http://localhost:8000
      - APP_TIMEZONE=Europe/Berlin
      - APP_LOCALE=de
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=saus_es
      - DB_USERNAME=saus_user
      - DB_PASSWORD=saus_password
      - SESSION_DRIVER=database
      - CACHE_STORE=file
      - LOG_CHANNEL=single
      - SAUS_UPLOAD_PATH=uploads/tickets
      - SAUS_NEWS_UPLOAD_PATH=uploads/news
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.6
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=saus_es
      - MYSQL_USER=saus_user
      - MYSQL_PASSWORD=saus_password
      - MYSQL_CHARACTER_SET=utf8mb4
      - MYSQL_COLLATION=utf8mb4_unicode_ci
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  vendor_data:
